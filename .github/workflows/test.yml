# Run the pure-logic unit tests (parsing helpers) on every push.
name: Unit tests

on:
  push:
    branches: '**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Run tests
      run: node --test
